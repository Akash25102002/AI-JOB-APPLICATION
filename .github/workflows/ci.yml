name: JobPilot AI CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build, Lint & Test Checks
    runs-on: ubuntu-latest

    services:
      # Setup ephemeral postgres for database migration tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword123
          POSTGRES_DB: jobpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v3
        with:
          node_version: 20
          cache: 'npm'
          cache-dependency-path: jobgenie/package-lock.json

      - name: Install Project Dependencies
        run: |
          cd jobgenie
          npm ci

      - name: Prisma Schema Lint & Validate
        run: |
          cd jobgenie
          npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:testpassword123@localhost:5432/jobpilot_test

      - name: Generate Prisma Client Types
        run: |
          cd jobgenie
          npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:testpassword123@localhost:5432/jobpilot_test

      - name: ESLint Code Quality Checks
        run: |
          cd jobgenie
          npm run lint

      - name: Next.js Compile Build Validation
        run: |
          cd jobgenie
          npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: postgresql://postgres:testpassword123@localhost:5432/jobpilot_test
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          GEMINI_API_KEY: AIzaSy_placeholder
          RESEND_API_KEY: re_placeholder
