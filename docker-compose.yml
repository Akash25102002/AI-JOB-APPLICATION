version: "3.8"

services:
  # Relational Database service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: jobpilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword123
      POSTGRES_DB: jobpilot_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobpilot_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # In-memory Caching & Job Lock service (Redis)
  redis:
    image: redis:7-alpine
    container_name: jobpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
